name: SEO build & IndexNow

# Regenerates the static SEO surface whenever the dataset or the generators
# change, so the 208 school pages / directory / pillar pages / sitemap can never
# go stale relative to data/exhibit-data.js — then pings IndexNow so Bing,
# Yandex, Brave and DuckDuckGo recrawl within hours instead of days.
#
# NOTE: this job commits regenerated files back to `main`. If `main` has branch
# protection that blocks Actions pushes, either allow github-actions[bot] to
# push, or swap GITHUB_TOKEN for a PAT with `contents: write`.

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/build_school_pages.py'
      - 'scripts/stamp_version.py'
      - 'scripts/build.sh'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seo-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Don't retrigger on the bot's own regeneration commit.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate static pages, sitemap & version stamp
        run: bash scripts/build.sh

      - name: Commit regenerated artifacts (if any changed)
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add school schools.html \
                  law-school-bar-passage-rates.html \
                  cheapest-law-schools.html \
                  law-school-employment-outcomes.html \
                  sitemap.xml index.html sw.js \
                  methodology.html terms.html about.html contact.html
          if git diff --cached --quiet; then
            echo "No regeneration diff."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: regenerate SEO static pages + sitemap [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping IndexNow
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # Give Cloudflare Pages a moment to publish the new commit before we
          # ask search engines to crawl. The ping is best-effort + idempotent.
          sleep 45
          python3 scripts/indexnow_ping.py
