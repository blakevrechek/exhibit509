<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exhibit 509 · Embedded chart</title>
<meta name="robots" content="noindex,follow">
<!-- Standalone embeddable widget. Renders ONE trend chart for one school from the
     shared ABA 509 dataset. Designed to be iframed on third-party sites/blogs;
     framing is permitted for this route only via _headers. Self-contained on
     purpose (no dependency on index.html internals) so the app stays untouched. -->
<style>
  :root{--navy:#06111E;--panel:#0B1A2A;--orange:#D97757;--white:#F4F8FB;--dim:#A4C8DD;--dimmer:#7AAAC8;--blue:#5AABCB;--line:rgba(74,122,155,0.22);--mono:ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--navy);color:var(--white);font-family:var(--mono);display:flex;}
  a{color:var(--orange);text-decoration:none;}
  .ew{display:flex;flex-direction:column;width:100%;height:100%;min-height:300px;padding:12px 14px 10px;background:radial-gradient(rgba(164,200,221,0.05) 1px,transparent 1px);background-size:20px 20px;}
  .ew-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:4px;}
  .ew-title{font-size:12.5px;letter-spacing:0.4px;color:var(--white);font-weight:700;line-height:1.3;}
  .ew-school{font-size:11px;color:var(--dim);letter-spacing:0.3px;margin-bottom:6px;}
  .ew-chart{flex:1;min-height:0;display:flex;align-items:stretch;}
  .ew-chart svg{width:100%;height:100%;}
  .ew-leg{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 2px;font-size:10.5px;color:var(--dim);}
  .ew-leg i{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle;}
  .ew-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid var(--line);padding-top:7px;margin-top:6px;}
  .ew-brand{font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:700;color:var(--white);white-space:nowrap;}
  .ew-brand em{font-style:normal;color:var(--orange);font-size:9px;font-family:var(--mono);letter-spacing:1.2px;margin-left:4px;text-transform:uppercase;}
  .ew-src{font-size:10px;color:var(--dimmer);text-align:right;line-height:1.4;}
  .ew-src a{border-bottom:1px dotted rgba(217,119,87,0.5);}
  .ew-msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;text-align:center;padding:20px;line-height:1.6;}
  text{font-family:var(--mono);}
</style>
<script src="data/exhibit-data.js"></script>
</head>
<body>
<div class="ew" id="ew"></div>
<script>
(function(){
  var SITE='https://exhibit509.com/';
  var q=new URLSearchParams(location.search);
  var id=(q.get('school')||'').trim();
  var key=(q.get('chart')||'').trim().toLowerCase();
  var root=document.getElementById('ew');
  var data=(typeof S!=='undefined'&&Array.isArray(S))?S:[];
  var s=data.find(function(x){return x.id===id;});

  // Chart registry — drawn from each school's {year:value} *_trend fields.
  var CFG={
    lsat:{title:'LSAT · 25–50–75 percentile band',band:['lsat25_trend','lsat_trend','lsat75_trend'],color:'#D6A520',fmt:function(v){return Math.round(v);},lo:115,hi:180},
    gpa:{title:'Undergraduate GPA · 25–50–75 band',band:['gpa25_trend','gpa_trend','gpa75_trend'],color:'#9BD1E8',fmt:function(v){return v.toFixed(2);},lo:1.9,hi:4.4},
    acceptance:{title:'Acceptance rate',lines:[['acc_trend','#EF5350','Acceptance']],fmt:function(v){return v.toFixed(1)+'%';}},
    applications:{title:'Applications & offers',lines:[['apps_trend','#A4C8DD','Applications'],['offers_trend','#5AABCB','Offers']],fmt:function(v){return Math.round(v).toLocaleString();}},
    enrollment:{title:'Enrollment',lines:[['enr_trend','#A78BFA','Enrollment']],fmt:function(v){return Math.round(v).toLocaleString();}},
    tuition:{title:'Tuition · resident → non-resident',band:['tui_trend','tui_trend','nrt_trend'],color:'#FFA726',fmt:function(v){return '$'+Math.round(v/1000)+'K';}},
    bar:{title:'Bar passage · first-time → 2-yr ultimate',lines:[['bar_trend','#4A9B6B','First-time'],['bar_2yr_trend','#5AABCB','2-yr ultimate']],fmt:function(v){return Math.round(v)+'%';}},
    conditional:{title:'Conditional scholarships · offered vs. eliminated',lines:[['cond_enter_trend','#5AABCB','Offered'],['cond_elim_trend','#EF5350','Eliminated']],fmt:function(v){return Math.round(v).toLocaleString();}}
  };

  function esc(t){return String(t==null?'':t).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function msg(t){ root.innerHTML='<div class="ew-msg">'+esc(t)+'</div>'+foot(); }
  function foot(){
    var deep=SITE+'school/'+encodeURIComponent(id||'')+(key&&CFG[key]?'/'+encodeURIComponent(key):'');
    var home=SITE+(s?('school/'+encodeURIComponent(id)):'');
    return '<div class="ew-foot"><a class="ew-brand" href="'+esc(s?deep:SITE)+'" target="_blank" rel="noopener">Exhibit 509 <em>by 509α</em></a>'
      +'<div class="ew-src">Source: ABA Standard 509 disclosures<br><a href="'+esc(s?home:SITE)+'" target="_blank" rel="noopener">exhibit509.com</a></div></div>';
  }

  if(!s){ msg(id?('School “'+id+'” not found.'):'No school specified.'); return; }
  var cfg=CFG[key];
  if(!cfg){ msg('Unknown chart “'+key+'”.'); return; }

  // Collect series (band → low/mid/high; lines → list). Each is {year:value}.
  var series=[]; // {field,color,label,vals}
  if(cfg.band){
    series=[
      {field:cfg.band[0],color:cfg.color,vals:s[cfg.band[0]]},
      {field:cfg.band[1],color:cfg.color,vals:s[cfg.band[1]]},
      {field:cfg.band[2],color:cfg.color,vals:s[cfg.band[2]]}
    ];
  } else {
    series=cfg.lines.map(function(l){return {field:l[0],color:l[1],label:l[2],vals:s[l[0]]};});
  }
  // Union of years across all series; drop zero/blank (reporting gaps).
  var yset={};
  series.forEach(function(se){ var v=se.vals||{}; Object.keys(v).forEach(function(y){ if(v[y]!=null&&v[y]!==''&&+v[y]>0) yset[y]=1; }); });
  var years=Object.keys(yset).map(Number).sort(function(a,b){return a-b;});
  if(years.length<2){ msg('Not enough reported history to chart this metric for '+(s.full||s.name||id)+'.'); return; }

  // y-scale across plotted values.
  var allv=[];
  series.forEach(function(se){ var v=se.vals||{}; years.forEach(function(y){ if(v[y]!=null&&+v[y]>0) allv.push(+v[y]); }); });
  var dmin=Math.min.apply(null,allv), dmax=Math.max.apply(null,allv);
  if(cfg.lo!=null){ dmin=Math.min(dmin,cfg.lo); }
  var pad=(dmax-dmin)*0.12||1; var ymin=Math.max(0,dmin-pad), ymax=dmax+pad;
  if(cfg.hi!=null) ymax=Math.min(ymax,cfg.hi);

  var W=600,H=300,PL=52,PR=14,PT=14,PB=26, iw=W-PL-PR, ih=H-PT-PB;
  var x0=years[0], x1=years[years.length-1];
  function X(y){ return PL+(x1===x0?iw/2:(y-x0)/(x1-x0)*iw); }
  function Y(v){ return PT+(ymax===ymin?ih/2:(1-(v-ymin)/(ymax-ymin))*ih); }
  function pts(vals){ return years.filter(function(y){return vals&&vals[y]!=null&&+vals[y]>0;}).map(function(y){return {x:X(y),y:Y(+vals[y]),yr:y,v:+vals[y]};}); }

  // y gridlines (4) + labels
  var grid='',ticks=4;
  for(var i=0;i<=ticks;i++){ var val=ymin+(ymax-ymin)*i/ticks, yy=Y(val);
    grid+='<line x1="'+PL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+yy.toFixed(1)+'" stroke="rgba(74,122,155,0.16)" stroke-width="1"/>'
      +'<text x="'+(PL-7)+'" y="'+(yy+3).toFixed(1)+'" text-anchor="end" font-size="9.5" fill="#7AAAC8">'+esc(cfg.fmt(val))+'</text>';
  }
  // x labels (first, last, and a couple between)
  var xlab='',step=Math.max(1,Math.round((years.length-1)/4));
  for(var j=0;j<years.length;j+=step){ var yr=years[j]; xlab+='<text x="'+X(yr).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#7AAAC8">'+yr+'</text>'; }
  if((years.length-1)%step!==0){ xlab+='<text x="'+X(x1).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#7AAAC8">'+x1+'</text>'; }

  var paint='';
  if(cfg.band){
    var lo=pts(series[0].vals), hi=pts(series[2].vals), mid=pts(series[1].vals);
    if(hi.length&&lo.length){
      var area=hi.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ')+' '+lo.slice().reverse().map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
      paint+='<polygon points="'+area+'" fill="'+cfg.color+'" fill-opacity="0.16" stroke="none"/>';
    }
    [series[0],series[2]].forEach(function(se){ var p=pts(se.vals); if(p.length) paint+='<polyline points="'+p.map(function(q){return q.x.toFixed(1)+','+q.y.toFixed(1);}).join(' ')+'" fill="none" stroke="'+cfg.color+'" stroke-opacity="0.45" stroke-width="1.4"/>'; });
    if(mid.length){ paint+='<polyline points="'+mid.map(function(q){return q.x.toFixed(1)+','+q.y.toFixed(1);}).join(' ')+'" fill="none" stroke="'+cfg.color+'" stroke-width="2.4" stroke-linejoin="round"/>'; mid.forEach(function(p){ paint+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="2.6" fill="'+cfg.color+'"/>'; }); }
  } else {
    series.forEach(function(se){ var p=pts(se.vals); if(!p.length) return;
      paint+='<polyline points="'+p.map(function(q){return q.x.toFixed(1)+','+q.y.toFixed(1);}).join(' ')+'" fill="none" stroke="'+se.color+'" stroke-width="2.4" stroke-linejoin="round"/>';
      p.forEach(function(pt){ paint+='<circle cx="'+pt.x.toFixed(1)+'" cy="'+pt.y.toFixed(1)+'" r="2.6" fill="'+se.color+'"/>'; });
    });
  }

  // legend
  var leg='';
  if(cfg.band){ leg='<span><i style="background:'+cfg.color+'"></i>median</span><span><i style="background:'+cfg.color+';opacity:.4"></i>25th–75th band</span>'; }
  else { leg=series.map(function(se){return '<span><i style="background:'+se.color+'"></i>'+esc(se.label)+'</span>';}).join(''); }

  var svg='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="'+esc((s.full||s.name)+' '+cfg.title)+'">'+grid+xlab+paint+'</svg>';

  root.innerHTML='<div class="ew-head"><div class="ew-title">'+esc(cfg.title)+'</div></div>'
    +'<div class="ew-school">'+esc(s.full||s.name||id)+(s.state?' · '+esc(s.state):'')+'</div>'
    +'<div class="ew-chart">'+svg+'</div>'
    +'<div class="ew-leg">'+leg+'</div>'
    +foot();
})();
</script>
</body>
</html>
